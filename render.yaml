services:
  # 1. API Spring Boot
  - type: web
    name: smartjobai-api
    runtime: image
    image:
      url: eclipse-temurin:21-jdk-alpine
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar -Dspring.profiles.active=prod smartjobai-api/target/smartjobai-api-1.0.0-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: smartjobai-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: smartjobai-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: smartjobai-db
          property: password

# 2. Banco PostgreSQL Gerenciado
databases:
  - name: smartjobai-db
    databaseName: smartjobai_db
    user: smartjobuser
